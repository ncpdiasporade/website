<svg width="1200" height="1500" viewBox="0 0 1200 1500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">মহান স্বাধীনতা ও জাতীয় দিবস ২০২৬ নেটওয়ার্কিং</title>
  <desc id="desc">বাংলাদেশ দূতাবাস, বার্লিন আয়োজিত নেটওয়ার্কিং ও সৌহার্দ্য বিনিময় অনুষ্ঠানে NCP Diaspora Alliance Germany প্রতিনিধিদলের অংশগ্রহণ।</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbf8"/>
      <stop offset="1" stop-color="#e6f1e8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d6130"/>
      <stop offset="1" stop-color="#063d1f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#052314" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="240" fill="#0d6130" opacity=".07"/>
  <circle cx="80" cy="1390" r="260" fill="#c01636" opacity=".06"/>
  <rect x="0" y="0" width="1200" height="24" fill="#0d6130"/>
  <rect x="0" y="24" width="1200" height="10" fill="#c01636"/>

  <g filter="url(#shadow)">
    <rect x="110" y="150" width="980" height="1200" rx="42" fill="#ffffff"/>
    <rect x="110" y="150" width="980" height="1200" rx="42" fill="none" stroke="#c9dfcf" stroke-width="2"/>
  </g>

  <g transform="translate(170 210)">
    <circle cx="78" cy="78" r="70" fill="url(#green)"/>
    <path d="M78 34 C98 58 112 72 140 78 C112 84 98 98 78 122 C58 98 44 84 16 78 C44 72 58 58 78 34Z" fill="none" stroke="#ffffff" stroke-width="9" stroke-linejoin="round"/>
    <text x="178" y="62" fill="#093f22" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800">NCP Diaspora Alliance</text>
    <text x="178" y="112" fill="#c01636" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="4">GERMANY</text>
  </g>

  <g transform="translate(170 430)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="860" height="72" rx="36" fill="#eef7f0"/>
    <text x="430" y="46" text-anchor="middle" fill="#0d6130" font-size="30" font-weight="700">বাংলাদেশ দূতাবাস, বার্লিন</text>

    <text x="430" y="190" text-anchor="middle" fill="#082614" font-size="62" font-weight="900">মহান স্বাধীনতা ও</text>
    <text x="430" y="270" text-anchor="middle" fill="#082614" font-size="62" font-weight="900">জাতীয় দিবস ২০২৬</text>
    <text x="430" y="354" text-anchor="middle" fill="#c01636" font-size="45" font-weight="800">নেটওয়ার্কিং ও সৌহার্দ্য বিনিময়</text>

    <rect x="74" y="440" width="712" height="260" rx="28" fill="#f7fbf8" stroke="#d7e7db" stroke-width="2"/>
    <text x="430" y="512" text-anchor="middle" fill="#234233" font-size="32" font-weight="700">৩০ এপ্রিল ২০২৬</text>
    <text x="430" y="584" text-anchor="middle" fill="#234233" font-size="30">NCP Diaspora Alliance Germany-এর</text>
    <text x="430" y="632" text-anchor="middle" fill="#234233" font-size="30">প্রতিনিধিদলের অংশগ্রহণ</text>

    <path d="M150 775 H710" stroke="#0d6130" stroke-width="4" stroke-linecap="round"/>
    <text x="430" y="860" text-anchor="middle" fill="#365343" font-size="27">কূটনীতিক, আমন্ত্রিত অতিথি ও কমিউনিটির প্রতিনিধিদের সঙ্গে</text>
    <text x="430" y="905" text-anchor="middle" fill="#365343" font-size="27">বাংলাদেশের গণতান্ত্রিক ভবিষ্যৎ ও প্রবাসী ভূমিকা নিয়ে মতবিনিময়</text>
  </g>

  <g transform="translate(170 1270)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="860" height="78" rx="20" fill="url(#green)"/>
    <text x="430" y="50" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800">Official Facebook Update Based Gallery Card</text>
  </g>
</svg>
