name: Sync official Facebook updates

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

concurrency:
  group: sync-official-facebook-updates
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the live branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch official Facebook posts
        run: npm run sync:facebook
        env:
          META_GRAPH_VERSION: ${{ vars.META_GRAPH_VERSION }}
          NCPDA_GERMANY_PAGE_ID: ${{ vars.NCPDA_GERMANY_PAGE_ID }}
          NCP_PAGE_ID: ${{ vars.NCP_PAGE_ID }}
          NCPDA_GERMANY_PAGE_ACCESS_TOKEN: ${{ secrets.NCPDA_GERMANY_PAGE_ACCESS_TOKEN }}
          NCP_PAGE_ACCESS_TOKEN: ${{ secrets.NCP_PAGE_ACCESS_TOKEN }}

      - name: Validate generated content
        run: npm run validate

      - name: Publish changes to GitHub Pages
        run: |
          git add data/recent-updates.json img/social
          if git diff --cached --quiet; then
            echo "No new Facebook content to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync official Facebook updates"
          git push origin main
