name: Content review automation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-content-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Search recent news
        run: npm run automation:news

      - name: Generate blog draft
        run: npm run automation:blog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}

      - name: Render blog pages
        run: npm run automation:render

      - name: Validate content
        run: npm run automation:validate

      - name: Open review pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "No content changes to review."
            exit 0
          fi

          branch="automation/content-review-$(date -u +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add automation.config.json data index.html package.json scripts .github
          if [ -d blog ]; then
            git add blog
          fi
          git commit -m "Prepare automated content review"
          git push --set-upstream origin "$branch"

          gh pr create \
            --title "Review automated content update" \
            --body "This PR was prepared by the scheduled content automation. Please review all news sources, generated blog text, dates, links, and tone before merging. Merging this PR publishes the approved changes to the live site." \
            --base main \
            --head "$branch"
