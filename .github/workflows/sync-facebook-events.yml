name: Sync Germany Facebook events

on:
  workflow_dispatch:
  schedule:
    - cron: '37 2 * * *'

permissions:
  contents: write

concurrency:
  group: sync-facebook-content
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the live branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch NCPDA Germany Facebook Events
        run: npm run sync:facebook-events
        env:
          REQUIRE_FACEBOOK_EVENTS: 'true'
          META_GRAPH_VERSION: ${{ vars.META_GRAPH_VERSION }}
          NCPDA_GERMANY_PAGE_ID: ${{ vars.NCPDA_GERMANY_PAGE_ID }}
          NCPDA_GERMANY_EVENT_URLS: ${{ vars.NCPDA_GERMANY_EVENT_URLS }}
          NCPDA_GERMANY_PAGE_ACCESS_TOKEN: ${{ secrets.NCPDA_GERMANY_PAGE_ACCESS_TOKEN }}

      - name: Validate generated content
        run: npm run validate

      - name: Publish কর্মসূচি changes to GitHub Pages
        run: |
          git add data/announcements.json img/events
          if git diff --cached --quiet; then
            echo "No Facebook Event changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync Germany Facebook events"
          git pull --rebase origin main
          git push origin main
